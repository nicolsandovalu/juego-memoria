<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego de Memoria — versión auditada</title>
<style>

    /* FIX Arquitectura/Accesibilidad: Refactorización a CSS fluido y relativo.
    BUG Arquitectura: El código original abusaba de unidades absolutas (px) 
    (ej. max-width: 540px, padding: 16px), lo que hace que la interfaz sea rígida 
    y no respete las preferencias de accesibilidad de escalado del navegador. 
    Se convirtieron las medidas a 'rem' y se formateó el código para su mantenibilidad.
  */

  body {
    font-family: system-ui, sans-serif;
    max-width: 33.75rem; /* 540px */
    margin: 2.5rem auto; /* 40px */
    padding: 0 1rem;     /* 16px */
    color: #222;
  }
  h1 { font-size: 1.4rem; }
  
  .fila {
    display: flex;
    gap: 0.5rem;         /* 8px */
    margin-bottom: 1rem; /* 16px */
  }
  
  input {
    flex: 1;
    padding: 0.5rem 0.625rem; /* 8px 10px */
    font-size: 1rem;
    border: 1px solid #bbb;
    border-radius: 0.375rem;  /* 6px */
  }
  
  button {
    padding: 0.5rem 0.75rem;  /* 8px 12px */
    font-size: 1rem;
    cursor: pointer;
    border: 1px solid #888;
    border-radius: 0.375rem;  /* 6px */
    background: #f3f3f3;
  }
  
  #tablero {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.625rem;            /* 10px */
    margin-top: 0.5rem;       /* 8px */
  }
  
  .carta {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    background: #2b3a42;
    color: #fff;
    border-radius: 0.625rem;  /* 10px */
    cursor: pointer;
    user-select: none;
  }
  
  .carta.volteada {
    background: #e8eef0;
    color: #222;
  }
  
  .carta.encontrada {
    background: #cdebd7;
    color: #222;
    cursor: default;
  }
  
  #movimientos {
    color: #666;
    font-size: 0.9rem;
    margin-top: 0.875rem;     /* 14px */
  }
  
  #mensaje {
    font-size: 1.1rem;
    font-weight: 600;
    margin-top: 0.5rem;       /* 8px */
  }
</style>
</head>
<body>
<h1>Juego de Memoria</h1>

<!--Arquitectura — Sin semántica HTML (Divitis):
       El código original estructuraba toda la vista con etiquetas <div>.
       Esto rompe los estándares de accesibilidad (a11y). Se reemplazaron 
       por etiquetas semánticas como <header> para los controles y <main> 
       para el tablero de juego.-->
       
<header class="fila" aria-label="Controles del juego">
  <input id="nombre" placeholder="Tu nombre...">
  <button id="iniciar">Iniciar / Reiniciar</button>
</header> 

<main id="tablero" aria-label="Tablero de cartas"></main>

<div id="tablero"></div>
<p id="movimientos"></p>
<p id="mensaje"></p>

<script>
  const EMOJIS = ['🍎', '🚀', '🐱', '🌵', '🎲', '🎧', '⚽', '🍕']; 

  // FIX Arquitectura: Agrupamos las variables sueltas en una única fuente de verdad.
  // BUG Arquitectura: Usar múltiples 'let' sueltos fragmenta el estado y dificulta el rastreo de bugs.
  const state = {
    cartas: [],
    volteadas: [],
    movimientos: 0,
    nombre: '',
    bloqueado: false // FIX Funcional: Añadimos una bandera para bloquear el tablero
  };

  const tablero = document.getElementById('tablero');

  document.getElementById('iniciar').addEventListener('click', function () {
    state.nombre = document.getElementById('nombre').value;
    state.cartas = [];
    EMOJIS.forEach(function (e) {
      state.cartas.push({ emoji: e, encontrada: false });
      state.cartas.push({ emoji: e, encontrada: false });
    });
    state.cartas.sort(function () { return Math.random() - 0.5; });
    state.volteadas = [];
    state.movimientos = 0;
    state.bloqueado = false; // Reiniciamos el bloqueo
    document.getElementById('mensaje').textContent = '';
    render();
  });

  // FIX Arquitectura/Rendimiento: Delegación de eventos en el contenedor padre.
  // BUG Arquitectura/Rendimiento: Antes se creaba un eventListener por cada carta dentro del bucle for en render(). Al reiniciar, los listeners antiguos quedaban en memoria (Memory Leak).
  tablero.addEventListener('click', function(e) {
    const div = e.target.closest('.carta');
    if (div) voltearCarta(div);
  });

  function render() {
    // FIX Arquitectura y Seguridad: Limpieza del DOM segura y optimizada.
    // BUG Arquitectura: Usar `innerHTML = ''` para vaciar un nodo es ineficiente 
    // porque obliga al navegador a invocar su parser de HTML. Además, mantiene 
    // en el código una propiedad inherentemente vulnerable a XSS.
    
    tablero.textContent = '';
    for (let i = 0; i < state.cartas.length; i++) {
      const div = document.createElement('div');
      div.className = 'carta';
      div.dataset.indice = i;
      
      // La UI se deriva del estado
      if (state.cartas[i].encontrada) div.classList.add('encontrada');
      if (state.volteadas.includes(i)) div.classList.add('volteada');
      
      div.textContent = state.cartas[i].encontrada || state.volteadas.includes(i) ? state.cartas[i].emoji : '?';
      
      // BUG ELIMINADO: div.addEventListener('click', ...) ya no está aquí.
      tablero.appendChild(div);
    }
    document.getElementById('movimientos').textContent = 'Movimientos: ' + state.movimientos;
  }

  function voltearCarta(div) {
    // FIX Funcional: Implementación de guardias (Guard Clauses)
    // BUG Funcional: Faltaba bloquear turnos. Permitía voltear 3 cartas rápido o hacer doble clic en la misma carta para que hiciera pareja consigo misma.
    if (state.bloqueado) return; 
    
    const i = Number(div.dataset.indice);
    
    if (state.cartas[i].encontrada) return; // Ignora cartas ya resueltas
    if (state.volteadas.includes(i)) return; // Ignora la carta si ya está volteada (evita auto-pareja)

    state.volteadas.push(i);
    render(); // FIX Arquitectura: Mutamos el estado y llamamos a render(), no mutamos el DOM directamente.

    if (state.volteadas.length === 2) {
      state.movimientos++;
      const a = state.volteadas[0];
      const b = state.volteadas[1];

      // FIX Arquitectura: Comparación basada en el estado (memoria de JS).
      // BUG Arquitectura: `if (divs[a].textContent === divs[b].textContent)` leía directamente del DOM. El DOM es una vista, no una base de datos.
      if (state.cartas[a].emoji === state.cartas[b].emoji) {
        state.cartas[a].encontrada = true;
        state.cartas[b].encontrada = true;
        state.volteadas = [];
        render();
        revisarVictoria();
      } else {
        state.bloqueado = true; // Bloqueamos el tablero antes del retardo
        setTimeout(function () {
          state.volteadas = [];
          state.bloqueado = false; // Desbloqueamos tras ocultar
          render();
        }, 800);
      }
    }
  }

  function revisarVictoria() {
    const todasEncontradas = state.cartas.every(function (c) { return c.encontrada; });
    if (todasEncontradas) {
      // FIX Seguridad: Uso de textContent para prevenir inyección de código.
      // BUG Seguridad: `innerHTML = '¡Ganaste, ' + nombre` ejecutaba cualquier script malicioso ingresado en el input (ej. <img src=x onerror=alert('hack')>).
      const mensaje = document.getElementById('mensaje');
      mensaje.textContent = '¡Ganaste, ' + state.nombre + '! 🎉';
    }
  }
</script>
</body>
</html>
